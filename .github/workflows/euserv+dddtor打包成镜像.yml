on:
  push:
    branches: [ main ]
    paths-ignore:
      - '.github/workflows/**'   # 忽略工作流文件的变化
    tags: [ 'v*' ]               # 当推送版本标签时触发（如 v1.0.0）
  release:
    types: [ published ]         # 当发布 Release 时触发
  workflow_dispatch:              # 允许手动触发
    inputs:
      image_name:
        description: '自定义镜像名称'
        required: false
        default: 'euserv-tg-wx'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write             # 允许推送到 GitHub Container Registry

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}  # GITHUB_TOKEN 自动可用

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # 镜像名称：ghcr.io/所有者/自定义名称（支持手动输入，默认 euserv-renewer）
          images: ghcr.io/${{ github.repository_owner }}/${{ github.event.inputs.image_name || 'euserv-oem' }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64   # 构建多架构镜像
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
