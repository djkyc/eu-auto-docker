name: EUserv 续期 

于:
  schedule:
    - cron: '0 0 7,8 * *'  # UTC时间每个月7号和8号的00:00，实际上会在北京时间的7号和8号早上8点触发
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run EUserv renew script
        env:
          EUSERV_EMAIL: ${{ secrets.EUSERV_EMAIL }}
          EUSERV_PASSWORD: ${{ secrets.EUSERV_PASSWORD }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          SKIP_CONTRACTS: ${{ secrets.SKIP_CONTRACTS }}
          DEBUG: ${{ secrets.DEBUG }}
        run: python euser_renew.py
