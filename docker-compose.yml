version: '3.8'

services:
  euserv-renew:
    build: .
    container_name: euserv-renew
    restart: unless-stopped
    environment:
      # === 必填配置 ===
      - EUSERV_EMAIL=您的EUserv邮箱
      - EUSERV_PASSWORD=您的EUserv密码
      - EMAIL_PASS=您的邮箱授权码
      
      # === 可选配置：Telegram 通知 ===
      - TG_BOT_TOKEN=您的TG_BOT_TOKEN
      - TG_CHAT_ID=您的TG_CHAT_ID
      
      # === 定时任务配置 ===
      # 每10天运行一次 (每月1日、11日、21日早上8点)
      - CRON_SCHEDULE=0 8 1,11,21 * *
      
      # 首次启动时立即运行一次 (true/false)
      - RUN_NOW=true
      
      # === 高级配置 ===
      # 要跳过的合同ID，逗号分隔 (例如: 475282,123456)
      # - SKIP_CONTRACTS=
      
      # 开启调试模式，显示详细日志 (true/false)
      # - DEBUG=false
    
    # 可选：挂载日志到本地
    volumes:
      - ./logs:/var/log
